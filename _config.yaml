# site properties and page defaults
title: Translational Neuroimmunology Research at Pitt
subtitle: Gadani Lab
description: In the Gadani lab, we're proud empiricists who believe science advances through bold ideas and rigorous experiments. We are interested in unraveling the neuroimmunology of progressive multiple sclerosis, neuroregeneration, and injury to inspire transformative treatments.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: contact@Sachin-Gadani.com
  orcid: 0000-0001-8713-9213
  google-scholar: ETJoidYAAAAJ
  github: Sachin-Gadani
  twitter: Sachin-Gadani
  youtube: Sachin-Gadani

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
